<div class="mb-4 p-4 rounded bg-red-50 text-red-700 border border-red-300">
  <ul class="list-disc list-inside">
    {% for error in errors %}
      <li>
        <strong>
          {% for error in errors %}
            <p>{{ error['loc'] | join('.') }}: {{ error['msg'] }}</p>
          {% endfor %}:
        </strong>
      </li>
    {% endfor %}
  </ul>
</div>
