<div class="relative inline-block">
  <button
    onclick="toggleHidden('tripDropdown')"
    class="p-2 flex flex-row rounded-sm bg-[var(--color-base2)] hover:bg-[var(--color-base3)] transition-colors duration-200"
  >
    <img src="{{ url_for('static', filename='graphics/direction-signal.svg') }}" alt="Trips Icon" class="w-[24px] h-[24px]"/> 
  </button>
  <div id="tripDropdown" class="p-2 absolute flex flex-col rounded-sm gap-2 bg-[var(--color-base2)]">
    <button class="flex flex-row rounded-xs gap-2 bg-[var(--color-base2)] hover:bg-[var(--color-base3)] transition-colors duration-200">
      <img src="{{ url_for('static', filename='graphics/add.svg') }}" alt="add-trip-icon" class="w-[24px] h-[24px]"/>
    </button>
    <button class="flex flex-row rounded-xs gap-2 bg-[var(--color-base2)] hover:bg-[var(--color-base3)] transition-colors duration-200">
      <img src="{{ url_for('static', filename='graphics/search.svg') }}" alt="search-trip-con" class="w-[24px] h-[24px]"/>
    </button>
  </div>
</div>
