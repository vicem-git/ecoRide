<form 
  id="create-moderator-form" 
  hx-post="{{ url_for('admin.create_moderator') }}" 
  hx-target="#moderators-view" 
  hx-swap="innerHTML"
  class="w-full p-4 bg-(--color-ground2) rounded-sm"
  hx-on::response-error="window.Alpine.store('modal').htmlContent(event.detail.xhr.response)"
>
  <h2 class="text-base lg:text-lg font-semibold text-(--color-contrast3)">Créer un modérateur</h2>
  <hr class="mb-4"/>
  
  <div class="mb-4">
    <label for="email" class="block text-sm font-medium text-(--color-contrast3)">Email</label>
    <input type="email" id="email" name="email" required class="mt-1 block w-full p-2 bg-(--color-ground1) rounded-sm focus:ring-2 focus:ring-(--color-contrast2) focus:outline-none">
  </div>

  <div class="mb-4">
    <label for="password" class="block text-sm font-medium text-(--color-contrast3)">Mot de passe</label>
    <input type="password" id="password" name="password" required class="mt-1 block w-full p-2 bg-(--color-ground1) rounded-sm focus:ring-2 focus:ring-(--color-contrast2) focus:outline-none">
  </div>
  
  <button type="submit" class="px-4 py-2 bg-(--color-ground3) text-(--color-contrast3) rounded-sm hover:bg-(--color-ground4)">Créer</button>
</form>
