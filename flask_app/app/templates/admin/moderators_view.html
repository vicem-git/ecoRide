{% if moderators %}
<section class="p-2 w-full mb-2 gap-2">
    {% for mod in moderators %}
      <div class="p-2 flex items-center justify-between bg-ground1 rounded-sm border border-ground3">
        <p class="flex gap-6">
          <span class="font-semibold">{{ mod.email }}</span>
          <span class="{{ 'text-apart2' if mod.status == 'active' else 'text-error2' }}">{{ mod.status }}</span>
        </p>
        {% if mod.status == 'active' %}
          <button
            hx-post="{{ url_for('admin.suspend_account', account_id=mod.id) }}"
            hx-confirm="Etes-vous sûr de vouloir suspendre ce modérateur ?"
            hx-target="#moderators-view"
            hx-swap="innerHTML"
            hx-on::response-error="window.Alpine.store('modal').setError(event.detail.xhr.response)"
            class="px-4 py-2 mb-2 rounded-sm bg-apart hover:bg-apart2 text-ground2 transition-colors duration-200"
          >
            Suspendre
          </button>
        {% elif mod.status == 'suspended' %}
          <button
            hx-post="{{ url_for('admin.activate_account', account_id=mod.id) }}"
            hx-confirm="Etes-vous sûr de vouloir activer ce modérateur ?"
            hx-target="#moderators-view"
            hx-swap="innerHTML"
            hx-on::response-error="window.Alpine.store('modal').setError(event.detail.xhr.response)"
            class="px-4 py-2 mb-2 rounded-sm bg-ground2 hover:bg-ground3 text-contrast2 transition-colors duration-200"
          >
            Activer
          </button>
        {% endif %}
      </div>
    {% endfor %}
  </section>
{% else %}
  <p class="text-contrast4">Aucun modérateur actif trouvé.</p>
{% endif %}
