<div id="server-messages">
</div>
<form id="register-form" hx-post="{{ url_for('auth.register_user') }}" hx-trigger="submit" hx-target="#global-modal"
  hx-swap="innerHTML" hx-on::after-response="window.Alpine.store('modal').open()"
  hx-on::response-error="window.Alpine.store('modal').htmlContent(event.detail.xhr.response)"
  class="flex flex-col items-center gap-4 mt-6">
  <div class="text-base md:text-xl flex flex-col items-center justify-center mb-12 gap-3">
    <h2 class="md:mb-8 tracking-wide font-bold">veuillez fournir les détails d'inscription</h2>
    <label for="reg-email" class="sr-only">Email</label>
    <input type="email" id="reg-email" name="email" placeholder="Email"
      class="mb-4 p-2 border border-(--color-ground4) rounded-sm focus:ring-2 focus:ring-(--color-eco-ground3) focus:outline-none"
      required />
    <label for="reg-password" class="sr-only">Mot de passe</label>
    <input type="password" id="reg-password" name="password" placeholder="Mot de passe"
      class="mb-4 p-2 border border-(--color-ground4) rounded-sm focus:ring-2 focus:ring-(--color-eco-ground3) focus:outline-none"
      required />
    <label for="reg-confirm-password" class="sr-only">Confirmer le mot de passe</label>
    <input type="password" id="reg-confirm-password" name="confirm_password" placeholder="Confirmer le mot de passe"
      class="mb-4 p-2 border border-(--color-ground4) rounded-sm focus:ring-2 focus:ring-(--color-eco-ground3) focus:outline-none"
      required />
    <label for="reg-username" class="sr-only">Nom d'utilisateur</label>
    <input type="text" id="reg-username" name="username" placeholder="Choisir un nom d'utilisateur"
      class="p-2 border border-(--color-ground4) rounded-sm focus:ring-2 focus:ring-(--color-eco-ground3) focus:outline-none" required />
  </div>
  <div class="flex flex-col text-base md:text-xl gap-2 mb-8">
    <p class="font-medium">Comment allez-vous utiliser la plateforme ?</p>

    <div class="flex items-center gap-2">
      <input type="checkbox" id="role-driver" name="roles" value="driver"
        class="focus:ring-2 focus:ring-(--color-eco-ground3) focus:outline-none" />
      <label for="role-driver">Conducteur.ice</label>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" id="role-passenger" name="roles" value="passenger"
        class="focus:ring-2 focus:ring-(--color-eco-ground3) focus:outline-none" />
      <label for="role-passenger">Passager</label>
    </div>
  </div>
  <button type="submit"
    class="px-4 py-2 rounded-sm bg-(--color-ground4) hover:bg-(--color-ground5) font-semibold"
    type="submit">Inscription !</button>
</form>
