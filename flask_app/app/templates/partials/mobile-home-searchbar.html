<form method="GET" action="{{ url_for('pages.search_trips') }}"
  class="flex flex-col gap-3 w-full rounded-2xl bg-(--color-ground2)/70 backdrop-blur-md p-2 text-(--color-contrast)">

  <div class="flex flex-col gap-1">
    <label for="home_start_city" class="sr-only">Ville de départ</label>
    <div class="flex items-center gap-2 bg-(--color-ground2)/90 rounded-xl px-2 focus-within:bg-(--color-ground3) transition">
      <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" aria-hidden="true">
        {% include "graphics/loc-point.html" %}
      </svg>
      <select id="home_start_city" name="start_city" x-model="$store.tripSearch.start_city"
        class="w-full h-11 bg-transparent font-normal focus:outline-none text-(--color-contrast)" required>
        <option value="">Départ...</option>
        {% for city in cities %}
        <option value="{{ city }}">{{ city }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="flex flex-col gap-1">
    <label for="home_end_city" class="sr-only">Ville d'arrivée</label>
    <div class="flex items-center gap-2 bg-(--color-ground2)/90 rounded-xl px-2 focus-within:bg-(--color-ground3) transition">
      <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" aria-hidden="true">
        {% include "graphics/loc-point.html" %}
      </svg>
      <select id="home_end_city" name="end_city" x-model="$store.tripSearch.end_city"
        class="w-full h-11 bg-transparent font-normal focus:outline-none text-(--color-contrast)" required>
        <option value="">Arrivée...</option>
        {% for city in cities %}
        <option value="{{ city }}">{{ city }}</option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="flex gap-3 items-center">
    <div class="flex flex-col gap-1 flex-1">
      <label for="home_start_date" class="sr-only">Date de départ</label>
      <input id="home_start_date" type="date" name="start_date"
        class="h-11 w-full px-2 bg-(--color-ground2) rounded-xl font-normal text-(--color-contrast) focus:bg-(--color-ground3) focus:outline-none focus:ring-2 focus:ring-(--color-eco) transition" />
    </div>
    <div class="flex items-center gap-2 bg-(--color-ground2)/90 rounded-xl px-2 h-11 focus-within:bg-(--color-ground3) transition">
      <label for="home_passenger_nr" class="sr-only">Nombre de passagers</label>
      <svg viewBox="0 0 24 24" class="w-5 h-5 shrink-0" aria-hidden="true">
        {% include "graphics/users-icon.html" %}
      </svg>
      <input id="home_passenger_nr" type="number" name="passenger_nr" min="1" max="6" placeholder="1"
        class="w-12 bg-transparent text-(--color-contrast) text-center focus:outline-none" />
    </div>
  </div>

  <div class="flex items-center justify-center gap-4">
    {% include "trips/trip_filters.html" %}
    <input type="hidden" name="eco_filter" :value="$store.tripSearch.tripEco ? 'true' : 'false'">
    <input type="hidden" name="max_price" :value="$store.tripSearch.price">
    <input type="hidden" name="driver_rating" :value="$store.tripSearch.rating">
  </div>

  <button type="submit"
    aria-label="Rechercher des voyages"
    class="flex items-center justify-center gap-2 h-12 w-full rounded-xl bg-(--color-eco-ground2) text-(--color-contrast) font-semibold hover:bg-(--color-eco-ground3) focus:outline-none focus:ring-2 focus:ring-(--color-eco) transition">
    <svg viewBox="0 0 24 24" class="w-5 h-5" aria-hidden="true">
      {% include "graphics/search-icon.html" %}
    </svg>
    Rechercher
  </button>
</form>
