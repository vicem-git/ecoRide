<div class="relative inline-block" x-data="{ dropdownOpen: false }">
  <button
    @click="dropdownOpen = !dropdownOpen"
    :aria-expanded="dropdownOpen"
    aria-label="Menu utilisateur"
    class="p-2 flex rounded-sm hover:bg-(--color-ground4) transition-colors">
    <svg viewBox="0 0 24 24" class="w-8 h-8" aria-hidden="true">
      {% include "graphics/user-icon.html" %}
    </svg>
  </button>
  <div
    id="user-dropdown"
    x-cloak
    x-show="dropdownOpen"
    x-transition
    @click.outside="dropdownOpen = false"
    class="absolute right-0 top-full mt-2 min-w-48 rounded-sm bg-(--color-ground2) shadow-2xl border border-(--color-ground3) overflow-hidden z-50">
    <div class="flex flex-col p-2">
      {% if not current_user.is_authenticated %}
        <a href="{{ url_for('pages.login') }}"
          class="px-4 py-2.5 rounded-sm text-(--color-contrast) hover:bg-(--color-ground3) active:bg-(--color-ground4) transition-colors whitespace-nowrap">
          Connexion
        </a>
        <hr class="border-(--color-ground3) mx-2">
        <a href="{{ url_for('pages.registration') }}"
          class="px-4 py-2.5 rounded-sm text-(--color-contrast) hover:bg-(--color-ground3) active:bg-(--color-ground4) transition-colors whitespace-nowrap">
          Inscription
        </a>
      {% elif current_user.is_authenticated and current_user.user_id %}
        <a href="{{ url_for('pages.profile', identifier=current_user.user_id) }}"
          class="px-4 py-2.5 rounded-sm text-(--color-contrast) hover:bg-(--color-ground3) active:bg-(--color-ground4) transition-colors whitespace-nowrap">
          Tableau de bord
        </a>
        <hr class="border-(--color-ground3) mx-2">
        <a href="{{ url_for('auth.logout') }}"
          class="px-4 py-2.5 rounded-sm text-(--color-contrast) hover:bg-(--color-ground3) active:bg-(--color-ground4) transition-colors whitespace-nowrap">
          Déconnexion
        </a>
      {% endif %}
      <hr class="border-(--color-ground3) mx-2">
      <a href="{{ url_for('pages.contact') }}"
        class="px-4 py-2.5 rounded-sm text-(--color-contrast) hover:bg-(--color-ground3) active:bg-(--color-ground4) transition-colors whitespace-nowrap">
        Contact
      </a>
    </div>
  </div>
</div>
