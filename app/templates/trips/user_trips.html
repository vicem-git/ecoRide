<section id="user-trips" class="p-4 flex flex-col gap-6 text-contrast3 rounded-sm bg-ground3 w-full">
  <h2 class="text-xl text-contrast">Voyages</h2>
  <div class="flex flex-col gap-6 w-full">
    {% if "passenger" in roles %}
      <div class="flex justify-start">
        <h3 class="p-4">Passager</h3>
        <div class="flex flex-col ml-8">
          <h4>À venir</h4>
          <div
            hx-get="{{ url_for('trips.passenger_trips_by_status', for_user=current_user.user_id, status="upcoming") }}"
            hx-trigger="load"
            hx-target="#passenger-upcoming"
            hx-swap="outerHTML"
          >
          </div>

          <h4>En cours</h4>
          <div
            hx-get="{{ url_for('trips.passenger_trips_by_status', for_user=current_user.user_id, status="in-progress") }}"
            hx-trigger="load"
            hx-target="#passenger-in-progress"
            hx-swap="outerHTML"
          >
            <div id="passenger-in-progress"></div>
          </div>

          <h4>Terminés</h4>
          <div
            hx-get="{{ url_for('trips.passenger_trips_by_status', for_user=current_user.user_id, status="completed") }}"
            hx-trigger="load"
            hx-target="#passenger-completed"
            hx-swap="outerHTML"
          >
            <div id="passenger-completed"></div>
          </div>
        </div> 
      </div>
    {% endif %}

    {% if "driver" in roles %}
      <div class="flex justify-start w-full">
        <h3 class="p-4">Conducteur.ice</h3>
        <div class="flex flex-col ml-8">
          <h4>À venir</h4>
          <div
            id="driver-upcoming"
            hx-get="{{ url_for('trips.driver_trips_by_status', for_user=current_user.user_id, status="upcoming") }}"
            hx-trigger="load"
            hx-target="#driver-upcoming-trips"
            hx-swap="innerHTML"
          >
            <div id="driver-upcoming" class="flex flex-col gap-2"></div> 
          </div>

          <h4>En cours</h4>
          <div
            hx-get="{{ url_for('trips.driver_trips_by_status', for_user=current_user.user_id, status="in-progress") }}"
            hx-trigger="load"
            hx-target="#driver-in-progress"
            hx-swap="outerHTML"
          >
            <div id="driver-in-progress"></div>
          </div>

          <h4>Terminés</h4>
          <div
            hx-get="{{ url_for('trips.driver_trips_by_status', for_user=current_user.user_id, status="completed") }}"
            hx-trigger="load"
            hx-target="#driver-completed"
            hx-swap="outerHTML"
           >
            <div id="driver-completed"></div>
          </div>
        </div>
      </div>
    {% endif %}
  </div>
</section>
