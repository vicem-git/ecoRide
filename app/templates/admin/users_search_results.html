{% for user in users %}
<tr>
  <td>{{ user.email }}</td>
  <td>{{ user.username }}</td>
  <td>{{ user.status }}</td>
  <td>
    {% if user.status|lower == 'active' %}
      <button hx-post="{{ url_for('admin.suspend_account', account_id=user.account_id) }}"
              hx-target="#users-search-view"
              hx-swap="innerHTML"
              class="px-2 py-1 bg-error hover:bg-error2 text-white rounded">
        Suspendre
      </button>
    {% elif user.status|lower == 'suspended' %}
      <button hx-post="{{ url_for('admin.activate_account', account_id=user.account_id) }}"
              hx-target="#users-search-view"
              hx-swap="innerHTML"
              class="px-2 py-1 bg-green-600 hover:bg-green-700 text-white rounded">
        Activer
      </button>
    {% endif %}
  </td>
</tr>
{% else %}
<tr>
  <td colspan="4" class="text-center text-contrast4">Aucun utilisateur trouvé.</td>
</tr>
{% endfor %}
