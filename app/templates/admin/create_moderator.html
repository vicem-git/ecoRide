<form 
  id="create-moderator-form" 
  hx-post="{{ url_for('admin.create_moderator') }}" 
  hx-target="#moderators-view" 
  hx-swap="innerHTML"
  class="w-full p-4 bg-ground2 rounded-sm"
  hx-on::response-error="window.Alpine.store('modal').setError(event.detail.xhr.response)"
>
  <h2 class="text-base lg:text-lg font-semibold text-contrast3">Créer un modérateur</h2>
  <hr class="mb-4"/>
  
  <div class="mb-4">
    <label for="email" class="block text-sm font-medium text-contrast3">Email</label>
    <input type="email" id="email" name="email" required class="mt-1 block w-full p-2 bg-ground1 rounded-sm focus:ring-2 focus:ring-contrast2 focus:outline-none">
  </div>

  <div class="mb-4">
    <label for="password" class="block text-sm font-medium text-contrast3">Mot de passe</label>
    <input type="password" id="password" name="password" required class="mt-1 block w-full p-2 bg-ground1 rounded-sm focus:ring-2 focus:ring-contrast2 focus:outline-none">
  </div>
  
  <button type="submit" class="px-4 py-2 bg-ground3 text-contrast3 rounded-sm hover:bg-ground4">Créer</button>
</form>
