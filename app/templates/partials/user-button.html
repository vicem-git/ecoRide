<div class="relative inline-block" x-data="{ dropdownOpen: false }">
  <button @click="dropdownOpen = !dropdownOpen" class="p-2 flex flex-row rounded-xl hover:bg-ground3 transition-colors duration-200">
    <svg viewBox="0 0 24 24" class="w-[24px] h-[24px]">
      {% include "graphics/user-icon.html" %}
    </svg>
  </button>
  <div
    id="user-dropdown"
    x-cloak
    x-show="dropdownOpen"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="-translate-y-full opacity-0"
    x-transition:enter-end="translate-y-0 opacity-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="translate-y-0 opacity-100"
    x-transition:leave-end="opacity-0 -translate-y-full"
    class="p-2 absolute flex flex-col bg-ground2 rounded-sm gap-2"
  >
    {% if not current_user.is_authenticated %}
      <a href="{{ url_for('pages.login') }}" class="flex flex-row rounded-xs gap-2 hover:bg-ground3 transition-colors duration-200">
        <p> Connexion </p>
      </button>
      <a href="{{ url_for('pages.registration') }}" class="flex flex-row rounded-xs gap-2 hover:bg-ground3 transition-colors duration-200">
        <p> Inscription </p>
      </a>
      <a href="{{ url_for('pages.contact') }}" class="flex flex-row rounded-xs gap-2 hover:bg-ground3 transition-colors duration-200">
        <p> Contact </p>
      </a>
    {% elif current_user.is_authenticated and current_user.user_id %}
      <a href="{{ url_for('pages.profile', user_id=current_user.user_id) }}" class="flex flex-row rounded-xs gap-2 hover:bg-ground3 transition-colors duration-200">
        <p> Tableau de bord </p>
      </button>
      <a href="{{ url_for('pages.contact') }}" class="flex flex-row rounded-xs gap-2 hover:bg-ground3 transition-colors duration-200">
        <p> Contact </p>
      </a>
      <a href="{{ url_for('auth.logout') }}" class="flex flex-row rounded-xs gap-2 hover:bg-ground3 transition-colors duration-200">
        <p> Deconnexion </p>
      </a>
    {% endif %}
  </div>
</div>
